<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算道 - AI八字分析</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 简洁顶部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">☯</span>
                <span class="logo-text">算道</span>
            </div>
            <nav class="nav">
                <a href="#home" class="nav-link">首页</a>
                <a href="#about" class="nav-link">关于</a>
                <a href="pages/login.html" class="nav-link nav-login">登录</a>
                <a href="pages/register.html" class="btn-nav-register">注册</a>
            </nav>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main" id="home">
        <div class="container">
            <!-- 装饰性八卦图案 -->
            <div class="bagua-decoration bagua-left"></div>
            <div class="bagua-decoration bagua-right"></div>
            
            <!-- 标题区 -->
            <div class="title-section">
                <div class="cloud-decoration cloud-left">☁</div>
                <div class="cloud-decoration cloud-right">☁</div>
                <h1 class="main-title">
                    <span class="title-decoration">✦</span>
                    <span class="highlight">算道</span>
                    <span class="title-decoration">✦</span>
                </h1>
                <p class="subtitle">AI遇见东方智慧 · 为您解读命运玄机</p>
            </div>

            <!-- 核心功能区 - 输入框 -->
            <div class="input-section">
                <div class="input-box">
                    <textarea 
                        class="main-input" 
                        id="questionInput" 
                        placeholder="请输入您的问题，例如：我的事业运势如何？我的姻缘何时到来？"
                        rows="6"
                    ></textarea>
                    
                    <div class="input-actions">
                        <button class="btn-secondary" id="birthInfoBtn">
                            <span>📅</span>
                            <span>添加出生信息</span>
                        </button>
                        <button class="btn-primary" id="sendBtn">
                            <span>发送问题</span>
                            <span>→</span>
                        </button>
                    </div>
                </div>

                <!-- AI回复区域 -->
                <div id="aiResponse" class="ai-response" style="display: none;">
                    <div class="response-header">
                        <h3>✨ AI分析结果</h3>
                        <button class="close-btn" id="closeResponse">✕</button>
                    </div>
                    <div class="response-content" id="responseContent"></div>
                </div>
            </div>

            <!-- 快速问题建议 -->
            <div class="suggestions">
                <p class="suggestions-title">热门问题</p>
                <div class="suggestion-tags">
                    <button class="tag" data-question="请帮我分析一下我的事业运势，未来发展如何？">💼 事业运势</button>
                    <button class="tag" data-question="请帮我分析我的姻缘运势，何时能遇到合适的对象？">💑 姻缘分析</button>
                    <button class="tag" data-question="请帮我预测一下我的财运，近期财运如何？">💰 财运预测</button>
                    <button class="tag" data-question="请帮我分析我的健康运势，需要注意什么？">🏥 健康运势</button>
                    <button class="tag" data-question="请帮我分析我的家庭关系运势，如何改善家庭关系？">👨‍👩‍👧 家庭关系</button>
                    <button class="tag" data-question="请帮我分析我的学业运势，考试运如何？">📚 学业考试</button>
                </div>
            </div>

            <!-- 功能特色 -->
            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">🎯</div>
                    <h3>精准分析</h3>
                    <p>基于传统八字理论，结合AI深度学习</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">⚡</div>
                    <h3>即时响应</h3>
                    <p>2秒内获得详细分析结果</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🔒</div>
                    <h3>隐私保护</h3>
                    <p>您的信息完全保密，安全可靠</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 简洁页脚 -->
    <footer class="footer" id="about">
        <div class="container">
            <div class="about-section">
                <h3>关于算道</h3>
                <p>算道是一个结合传统八字理论与现代AI技术的智能分析平台，为您提供专业、准确的命理咨询服务。</p>
            </div>
            <p class="footer-text">© 2025 算道 · AI八字分析平台</p>
            <div class="footer-links">
                <a href="#" id="privacyLink">隐私政策</a>
                <a href="#" id="termsLink">服务条款</a>
                <a href="#" id="contactLink">联系我们</a>
            </div>
        </div>
    </footer>

    <script src="bazi_integration.js"></script>
    <script src="script.js"></script>
</body>
</html>
